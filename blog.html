---
layout: default
title: Blog
---
<h1>Posts</h1>
{% assign real_posts = site.posts | where: "project", nil %}
<ul>
  {% for post in real_posts %}
    <li>
      <h2><a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date_to_string }}</h2>
      <!-- TODO re-enable excerpt when you set the excerpts manually in each blog post-->
      <!-- {{ post.excerpt }} -->
    </li>
  {% endfor %}
</ul>
